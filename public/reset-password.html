<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Reset Password</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .reset-box {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      padding: 36px 30px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      margin: 0 0 10px;
      color: #222222;
      font-size: 26px;
    }

    p {
      text-align: center;
      color: #666666;
      font-size: 15px;
      margin: 0 0 25px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      font-weight: 600;
      color: #333333;
    }

    input {
      width: 100%;
      height: 46px;
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.12);
    }

    button {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 8px;
      background: #0066cc;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #004f9e;
    }

    button:disabled {
      background: #999999;
      cursor: not-allowed;
    }

    .message {
      display: none;
      margin-bottom: 18px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      line-height: 1.5;
    }

    .error {
      background: #ffecec;
      color: #c62828;
      border: 1px solid #ffcaca;
    }

    .success {
      background: #e9f8ef;
      color: #1b7f3a;
      border: 1px solid #c6edd3;
    }

    .password-note {
      font-size: 12px;
      color: #777777;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="reset-box">
    <h2>Reset Password</h2>
    <p>Please enter your new password below.</p>

    <div id="messageBox" class="message"></div>

    <form id="resetPasswordForm" novalidate onsubmit="return false;">
      <div class="form-group">
        <label for="password">New Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter new password"
          required
          minlength="8"
        />
        <div class="password-note">Password must be at least 8 characters.</div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirm new password"
          required
          minlength="8"
        />
      </div>

      <button type="button" id="submitBtn">Reset Password</button>
    </form>
  </div>

  <script>
      console.log("RESET PASSWORD PAGE SCRIPT LOADED");
    const form = document.getElementById("resetPasswordForm");
    const messageBox = document.getElementById("messageBox");
    const submitBtn = document.getElementById("submitBtn");

    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    const API_BASE_URL = "http://localhost:5000";

    function showMessage(message, type) {
      messageBox.style.display = "block";
      messageBox.className = "message " + type;
      messageBox.innerText = message;
    }

    function hideForm() {
      form.style.display = "none";
    }

    if (!token) {
      showMessage("Invalid reset link. Token is missing.", "error");
      hideForm();
    }

    submitBtn.addEventListener("click", async function () {

      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (!password || !confirmPassword) {
        showMessage("Please enter both password fields.", "error");
        return;
      }

      if (password.length < 8) {
        showMessage("Password must be at least 8 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      try {
        submitBtn.disabled = true;
        submitBtn.innerText = "Please wait...";

        const response = await fetch(
          `${API_BASE_URL}/api/v1/auth/reset-password/${token}`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              password: password,
              confirmPassword: confirmPassword,
            }),
          }
        );

        const data = await response.json();

        if (!response.ok || data.success === false) {
          showMessage(data.message || "Password reset failed.", "error");
          return;
        }

        showMessage(
          "Password reset successful. You can now login in the app.",
          "success"
        );

        form.reset();
        hideForm();
      } catch (error) {
        showMessage("Something went wrong. Please try again.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Reset Password";
      }
    });
  </script>
</body>
</html>
